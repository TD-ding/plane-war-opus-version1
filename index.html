<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞机大战</title>
<style>
  body { margin: 0; background: #0b1026; font-family: sans-serif; }
  canvas { display: block; margin: 0 auto; background: #0b1026; }
</style>
</head>
<body>
<canvas id="game" width="480" height="640"></canvas>
<script>
"use strict";

// ===== 配置：所有可调参数集中于此，方便统一修改 =====
var CONFIG = {
  width: 480,
  height: 640,
  player:  { w: 40, h: 40, speed: 5, color: "#4af" },
  bullet:  { w: 4, h: 10, speed: 8, color: "#ff0", interval: 300 },
  enemy:   { w: 40, h: 40, speed: 2, color: "#f44", interval: 1000 },
  scorePerKill: 10,
  startLives: 3,                 // 初始生命数
  levelUpEvery: 100,             // 每得这么多分升一级
  enemySpeedPerLevel: 0.4,       // 每级敌机额外速度
  hsKey: "planeWarHighScore"     // 最高分本地存储键
};

// 读取/保存本地最高分，刷新或重开都不丢失
function loadHighScore() {
  var v = parseInt(localStorage.getItem(CONFIG.hsKey), 10);
  return isNaN(v) ? 0 : v;
}
function saveHighScore(v) {
  try { localStorage.setItem(CONFIG.hsKey, String(v)); } catch (e) {}
}

var canvas = document.getElementById("game");
var ctx = canvas.getContext("2d");

// ===== 游戏状态：集中管理可变状态，避免散落的全局变量 =====
var state = {
  player: { x: CONFIG.width / 2 - CONFIG.player.w / 2, y: CONFIG.height - 80,
            w: CONFIG.player.w, h: CONFIG.player.h },
  bullets: [],
  enemies: [],
  score: 0,
  highScore: loadHighScore(),
  lives: CONFIG.startLives,
  level: 1,
  gameOver: false,
  paused: false,
  started: false,
  keys: {}
};

// ===== 输入处理 =====
document.addEventListener("keydown", function (e) {
  state.keys[e.key] = true;
  // 空格：开始 / 重新开始；P：暂停切换
  if (e.key === " ") {
    if (!state.started || state.gameOver) restart();
  }
  if (e.key === "p" || e.key === "P") {
    if (state.started && !state.gameOver) state.paused = !state.paused;
  }
});
document.addEventListener("keyup",   function (e) { state.keys[e.key] = false; });

// 触屏：手指拖动控制飞机，未开始/结束时点击重新开始
function pointerMove(clientX, clientY) {
  var rect = canvas.getBoundingClientRect();
  var p = state.player;
  p.x = clientX - rect.left - p.w / 2;
  p.y = clientY - rect.top - p.h / 2;
}
canvas.addEventListener("touchstart", function (e) {
  e.preventDefault();
  if (!state.started || state.gameOver) { restart(); return; }
  var t = e.touches[0];
  pointerMove(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener("touchmove", function (e) {
  e.preventDefault();
  if (state.started && !state.gameOver && !state.paused) {
    var t = e.touches[0];
    pointerMove(t.clientX, t.clientY);
  }
}, { passive: false });
canvas.addEventListener("mousedown", function () {
  if (!state.started || state.gameOver) restart();
});

// 重置全部状态，开始新的一局
function restart() {
  state.player.x = CONFIG.width / 2 - CONFIG.player.w / 2;
  state.player.y = CONFIG.height - 80;
  state.bullets = [];
  state.enemies = [];
  state.score = 0;
  state.lives = CONFIG.startLives;
  state.level = 1;
  state.gameOver = false;
  state.paused = false;
  state.started = true;
}

// ===== 工具：矩形碰撞检测（AABB） =====
function isColliding(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ===== 生成器：定时创建子弹与敌机 =====
function spawnBullet() {
  if (!state.started || state.gameOver || state.paused) return;
  var p = state.player;
  state.bullets.push({
    x: p.x + p.w / 2 - CONFIG.bullet.w / 2, y: p.y,
    w: CONFIG.bullet.w, h: CONFIG.bullet.h
  });
}
function spawnEnemy() {
  if (!state.started || state.gameOver || state.paused) return;
  state.enemies.push({
    x: Math.random() * (CONFIG.width - CONFIG.enemy.w), y: -CONFIG.enemy.h,
    w: CONFIG.enemy.w, h: CONFIG.enemy.h,
    // 敌机速度随关卡递增，难度逐步提升
    speed: CONFIG.enemy.speed + (state.level - 1) * CONFIG.enemySpeedPerLevel
  });
}
setInterval(spawnBullet, CONFIG.bullet.interval);
setInterval(spawnEnemy, CONFIG.enemy.interval);

// ===== 更新：移动、清理、碰撞 =====
function update() {
  var p = state.player, k = state.keys;
  if (k["ArrowLeft"])  p.x -= CONFIG.player.speed;
  if (k["ArrowRight"]) p.x += CONFIG.player.speed;
  if (k["ArrowUp"])    p.y -= CONFIG.player.speed;
  if (k["ArrowDown"])  p.y += CONFIG.player.speed;

  // 限制飞机在画布内
  p.x = Math.max(0, Math.min(CONFIG.width - p.w, p.x));
  p.y = Math.max(0, Math.min(CONFIG.height - p.h, p.y));

  // 移动子弹与敌机
  state.bullets.forEach(function (b) { b.y -= CONFIG.bullet.speed; });
  state.enemies.forEach(function (e) { e.y += e.speed; });

  // 清理越界对象，避免数组无限增长
  state.bullets = state.bullets.filter(function (b) { return b.y + b.h > 0; });
  state.enemies = state.enemies.filter(function (e) { return e.y < CONFIG.height; });

  // 子弹击中敌机：命中则双方移除并计分
  for (var i = state.enemies.length - 1; i >= 0; i--) {
    for (var j = state.bullets.length - 1; j >= 0; j--) {
      if (isColliding(state.enemies[i], state.bullets[j])) {
        state.enemies.splice(i, 1);
        state.bullets.splice(j, 1);
        state.score += CONFIG.scorePerKill;
        // 关卡随分数提升
        state.level = Math.floor(state.score / CONFIG.levelUpEvery) + 1;
        // 实时刷新最高分
        if (state.score > state.highScore) {
          state.highScore = state.score;
          saveHighScore(state.highScore);
        }
        break;
      }
    }
  }

  // 敌机撞到飞机：扣一条命并移除该敌机，命数耗尽才结束
  for (var m = state.enemies.length - 1; m >= 0; m--) {
    if (isColliding(state.player, state.enemies[m])) {
      state.enemies.splice(m, 1);
      state.lives--;
      if (state.lives <= 0) {
        state.lives = 0;
        state.gameOver = true;
      }
    }
  }
}

// ===== 渲染 =====
function drawRects(list, color) {
  ctx.fillStyle = color;
  list.forEach(function (o) { ctx.fillRect(o.x, o.y, o.w, o.h); });
}
function draw() {
  ctx.clearRect(0, 0, CONFIG.width, CONFIG.height);
  drawRects([state.player], CONFIG.player.color);
  drawRects(state.bullets, CONFIG.bullet.color);
  drawRects(state.enemies, CONFIG.enemy.color);

  ctx.fillStyle = "#fff";
  ctx.font = "20px sans-serif";
  ctx.fillText("得分: " + state.score, 10, 30);
  ctx.fillText("最高: " + state.highScore, 10, 55);
  ctx.fillText("第 " + state.level + " 关", CONFIG.width - 90, 30);
  ctx.fillText("生命: " + "♥".repeat(state.lives), CONFIG.width - 130, 55);

  ctx.textAlign = "center";
  if (!state.started) {
    ctx.font = "36px sans-serif";
    ctx.fillText("飞机大战", CONFIG.width / 2, CONFIG.height / 2 - 40);
    ctx.font = "18px sans-serif";
    ctx.fillText("方向键/手指拖动移动  ·  P 暂停", CONFIG.width / 2, CONFIG.height / 2);
    ctx.fillText("按空格 / 点击屏幕 开始", CONFIG.width / 2, CONFIG.height / 2 + 30);
  } else if (state.paused) {
    ctx.font = "40px sans-serif";
    ctx.fillText("已暂停", CONFIG.width / 2, CONFIG.height / 2);
    ctx.font = "18px sans-serif";
    ctx.fillText("按 P 继续", CONFIG.width / 2, CONFIG.height / 2 + 30);
  } else if (state.gameOver) {
    ctx.font = "40px sans-serif";
    ctx.fillText("游戏结束", CONFIG.width / 2, CONFIG.height / 2 - 20);
    ctx.font = "18px sans-serif";
    ctx.fillText("最终得分: " + state.score + "  最高: " + state.highScore, CONFIG.width / 2, CONFIG.height / 2 + 15);
    ctx.fillText("按空格 / 点击屏幕 重新开始", CONFIG.width / 2, CONFIG.height / 2 + 45);
  }
  ctx.textAlign = "left";
}

// ===== 主循环 =====
function loop() {
  if (state.started && !state.gameOver && !state.paused) update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞机大战</title>
<style>
  body { margin: 0; background: #0b1026; font-family: sans-serif; }
  canvas { display: block; margin: 0 auto; background: #0b1026; }
</style>
</head>
<body>
<canvas id="game" width="480" height="640"></canvas>
<script>
"use strict";

// ===== 配置：所有可调参数集中于此，方便统一修改 =====
var CONFIG = {
  width: 480,
  height: 640,
  player:  { w: 40, h: 40, speed: 5, color: "#4af" },
  bullet:  { w: 4, h: 10, speed: 8, color: "#ff0", interval: 300 },
  enemy:   { w: 40, h: 40, speed: 2, color: "#f44", interval: 1000 },
  scorePerKill: 10
};

var canvas = document.getElementById("game");
var ctx = canvas.getContext("2d");

// ===== 游戏状态：集中管理可变状态，避免散落的全局变量 =====
var state = {
  player: { x: CONFIG.width / 2 - CONFIG.player.w / 2, y: CONFIG.height - 80,
            w: CONFIG.player.w, h: CONFIG.player.h },
  bullets: [],
  enemies: [],
  score: 0,
  gameOver: false,
  keys: {}
};

// ===== 输入处理 =====
document.addEventListener("keydown", function (e) { state.keys[e.key] = true; });
document.addEventListener("keyup",   function (e) { state.keys[e.key] = false; });

// ===== 工具：矩形碰撞检测（AABB） =====
function isColliding(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ===== 生成器：定时创建子弹与敌机 =====
function spawnBullet() {
  if (state.gameOver) return;
  var p = state.player;
  state.bullets.push({
    x: p.x + p.w / 2 - CONFIG.bullet.w / 2, y: p.y,
    w: CONFIG.bullet.w, h: CONFIG.bullet.h
  });
}
function spawnEnemy() {
  if (state.gameOver) return;
  state.enemies.push({
    x: Math.random() * (CONFIG.width - CONFIG.enemy.w), y: -CONFIG.enemy.h,
    w: CONFIG.enemy.w, h: CONFIG.enemy.h, speed: CONFIG.enemy.speed
  });
}
setInterval(spawnBullet, CONFIG.bullet.interval);
setInterval(spawnEnemy, CONFIG.enemy.interval);

// ===== 更新：移动、清理、碰撞 =====
function update() {
  var p = state.player, k = state.keys;
  if (k["ArrowLeft"])  p.x -= CONFIG.player.speed;
  if (k["ArrowRight"]) p.x += CONFIG.player.speed;
  if (k["ArrowUp"])    p.y -= CONFIG.player.speed;
  if (k["ArrowDown"])  p.y += CONFIG.player.speed;

  // 限制飞机在画布内
  p.x = Math.max(0, Math.min(CONFIG.width - p.w, p.x));
  p.y = Math.max(0, Math.min(CONFIG.height - p.h, p.y));

  // 移动子弹与敌机
  state.bullets.forEach(function (b) { b.y -= CONFIG.bullet.speed; });
  state.enemies.forEach(function (e) { e.y += e.speed; });

  // 清理越界对象，避免数组无限增长
  state.bullets = state.bullets.filter(function (b) { return b.y + b.h > 0; });
  state.enemies = state.enemies.filter(function (e) { return e.y < CONFIG.height; });

  // 子弹击中敌机：命中则双方移除并计分
  for (var i = state.enemies.length - 1; i >= 0; i--) {
    for (var j = state.bullets.length - 1; j >= 0; j--) {
      if (isColliding(state.enemies[i], state.bullets[j])) {
        state.enemies.splice(i, 1);
        state.bullets.splice(j, 1);
        state.score += CONFIG.scorePerKill;
        break;
      }
    }
  }

  // 敌机撞到飞机：游戏结束
  for (var m = 0; m < state.enemies.length; m++) {
    if (isColliding(state.player, state.enemies[m])) {
      state.gameOver = true;
      break;
    }
  }
}

// ===== 渲染 =====
function drawRects(list, color) {
  ctx.fillStyle = color;
  list.forEach(function (o) { ctx.fillRect(o.x, o.y, o.w, o.h); });
}
function draw() {
  ctx.clearRect(0, 0, CONFIG.width, CONFIG.height);
  drawRects([state.player], CONFIG.player.color);
  drawRects(state.bullets, CONFIG.bullet.color);
  drawRects(state.enemies, CONFIG.enemy.color);

  ctx.fillStyle = "#fff";
  ctx.font = "20px sans-serif";
  ctx.fillText("得分: " + state.score, 10, 30);

  if (state.gameOver) {
    ctx.font = "40px sans-serif";
    ctx.fillText("游戏结束", CONFIG.width / 2 - 80, CONFIG.height / 2);
  }
}

// ===== 主循环 =====
function loop() {
  if (!state.gameOver) update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
